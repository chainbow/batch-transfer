[profile.default]
src = "src"
out = "out"
script = "script"
libs = ["dependencies"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
mainnet = "${ETHEREUM_RPC_URL}"
base = "${BASE_RPC_URL}"
bsc = "${BSC_RPC_URL}"

# Etherscan API v2: one key verifies across Etherscan/Basescan/Bscscan via
# chain id. If your forge version predates this, replace ${ETHERSCAN_API_KEY}
# per-line with ${BASESCAN_API_KEY} / ${BSCSCAN_API_KEY}.
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
bsc = { key = "${ETHERSCAN_API_KEY}", chain = 56 }

[dependencies]
forge-std = "1.9.7"
"@openzeppelin-contracts" = "5.6.1"
